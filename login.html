<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catalyst</title>
  <link rel="shortcut icon" href="catalyst.png" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07070f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .box {
      background: #0f0f1d;
      border: 1px solid #1a1a2e;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }
    .top { text-align: center; margin-bottom: 32px; }
    .top img { height: 44px; margin-bottom: 14px; opacity: 0.7; }
    .top h1 { color: #fff; font-size: 20px; font-weight: 700; }
    label {
      display: block;
      color: #555570;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #16162a;
      border: 1px solid #222238;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #7c3aed; }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.87; }
    .err {
      margin-top: 12px;
      color: #f87171;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    @media(max-width:480px){
      .box { padding: 36px 22px; margin: 16px; }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="top">
      <img src="catalyst.png" alt="">
      <h1>Access Required</h1>
    </div>
    <form id="f">
      <label>Password</label>
      <input type="password" id="pw" placeholder="••••••••••" autocomplete="current-password" required>
      <button type="submit">Continue</button>
      <div class="err" id="err">Incorrect password.</div>
    </form>
  </div>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: document.getElementById('pw').value })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/dashboard.html';
      } else {
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
